<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Information Extraction</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="hero">
            <h1>📄 AI PDF Information Extraction</h1>
            <p>Upload a PDF and extract structured information instantly.</p>
        </div>

        <div class="card">

            <label>Upload PDF</label>

            <input
                type="file"
                id="pdfFile"
                accept=".pdf">

            <label>Keyword (Optional)</label>

            <input
                type="text"
                id="keyword"
                placeholder="Enter keyword (optional)">

            <button onclick="extractData()">
                Extract Information
            </button>

        </div>

        <div class="output-card">

            <div class="output-header">

                <h2>JSON Output</h2>

                <button onclick="copyJson()">
                    Copy
                </button>

            </div>

            <pre id="responseBox">
Upload a PDF and click Extract Information
            </pre>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
