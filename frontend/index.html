<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Information Extraction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📄 AI PDF Information Extraction</h1>

    <p>
        Upload a PDF and extract structured information instantly.
    </p>

    <div class="card">

        <label for="pdfFile">Upload PDF</label>
        <input
            type="file"
            id="pdfFile"
            accept=".pdf"
            title="Upload a PDF file"
        >

        <label for="keyword">Keyword (optional)</label>
        <input
            type="text"
            id="keyword"
            placeholder="Enter keyword (optional)"
            title="Enter a keyword to filter extraction"
        >

        <button onclick="extractData()">
            Extract Information
        </button>

    </div>

    <div class="output">

        <div class="output-header">

            <h2>JSON Output</h2>

            <button onclick="copyJson()">
                Copy
            </button>

        </div>

        <pre id="responseBox">
Upload a PDF and click Extract Information
        </pre>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
