<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Information Extraction</title>

    <link rel="stylesheet" href="/static/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="hero">

        <h1>📄 AI PDF Information Extraction</h1>

        <p>
            Upload a PDF and instantly extract structured information using AI.
        </p>

    </div>

    <div class="container">

        <div class="upload-card">

            <h2>
                <i class="fa-solid fa-cloud-arrow-up"></i>
                Upload Document
            </h2>

            <input
                type="file"
                id="pdfFile"
                accept=".pdf">

            <input
                type="text"
                id="keyword"
                placeholder="Keyword (optional)">

            <button onclick="extractData()">
                Extract Information
            </button>

        </div>

        <div id="documentInfo"></div>

        <div class="accordion-card">

            <h2>
                <i class="fa-solid fa-circle-info"></i>
                Important Information
            </h2>

            <div id="accordionContainer"></div>

        </div>

        <div class="json-card">

            <button
                class="json-btn"
                onclick="toggleJson()">

                View Raw JSON

            </button>

            <pre id="responseBox"></pre>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
