<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Information Extraction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>📄 AI PDF Information Extraction</h1>

    <p class="subtitle">
        Upload a PDF and extract structured information instantly.
    </p>

    <div class="upload-card">

        <input
            type="file"
            id="pdfFile"
            accept=".pdf">

        <input
            type="text"
            id="keyword"
            placeholder="Enter keyword (optional)">

        <button onclick="extractData()">
            Extract Information
        </button>

    </div>

    <div id="documentInfo"></div>

    <div class="info-card">

        <h2>Important Information</h2>

        <div id="accordionContainer"></div>

    </div>

    <div class="json-card">

        <button onclick="toggleJson()">
            Show / Hide Raw JSON
        </button>

        <pre id="responseBox"></pre>

    </div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
